services:
  #Databases
  auth-db:
    image: postgres:16-alpine
    container_name: aura_auth_db
    env_file: ./auth-service/.env
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  doctor-db:
    image: postgres:16-alpine
    container_name: aura_doctor_db
    env_file: ./doctor-service/.env
    volumes:
      - doctor_db_data:/var/lib/postgresql/data
      - ./doctor-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  patient-db:
    image: postgres:16-alpine
    container_name: aura_patient_db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - patient_db_data:/var/lib/postgresql/data
      - ./patient-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  appointment-db:
    image: postgres:16-alpine
    container_name: aura_appointment_db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - appointment_db_data:/var/lib/postgresql/data
      - ./appointment-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    container_name: aura_payment_db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - payment_db_data:/var/lib/postgresql/data
      - ./payment-service/src/database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    container_name: aura_notification_db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - notification_db_data:/var/lib/postgresql/data
      - ./notification-service/src/database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  telemedicine-db:
    image: postgres:16-alpine
    container_name: aura_telemedicine_db
    environment:
      POSTGRES_DB: telemedicine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - telemedicine_db_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  #Backend Services
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: aura_auth_service
    env_file: ./auth-service/.env
    ports:
      - "5001:5001"
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: aura_doctor_service
    env_file: ./doctor-service/.env
    ports:
      - "5002:5002"
    depends_on:
      doctor-db:
        condition: service_healthy
    restart: unless-stopped

  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: aura_patient_service
    env_file: ./patient-service/.env
    ports:
      - "5003:5003"
    depends_on:
      patient-db:
        condition: service_healthy
    volumes:
      - patient_uploads:/app/uploads
    restart: unless-stopped

  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: aura_appointment_service
    env_file: ./appointment-service/.env
    ports:
      - "5004:5004"
    depends_on:
      appointment-db:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: aura_payment_service
    env_file: ./payment-service/.env  
    ports:
      - "5005:5005"
    depends_on:
      payment-db:
        condition: service_healthy
      appointment-service:
        condition: service_started
      notification-service:
        condition: service_started
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: aura_notification_service
    env_file: ./notification-service/.env
    ports:
      - "5006:5006"
    depends_on:
      notification-db:
        condition: service_healthy
    restart: unless-stopped

  telemedicine-service:
    build:
      context: ./telemedicine-service
      dockerfile: Dockerfile
    container_name: aura_telemedicine_service
    env_file: ./telemedicine-service/.env
    ports:
      - "5007:5007"
    depends_on:
      telemedicine-db:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: aura_api_gateway
    env_file: ./api-gateway/.env
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - doctor-service
      - patient-service
      - appointment-service
      - payment-service
      - notification-service
      - telemedicine-service
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aura_frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped



services:
  #Databases
  auth-db:
    image: postgres:16-alpine
    container_name: aura_auth_db
    env_file: ./auth-service/.env
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  doctor-db:
    image: postgres:16-alpine
    container_name: aura_doctor_db
    env_file: ./doctor-service/.env
    volumes:
      - doctor_db_data:/var/lib/postgresql/data
      - ./doctor-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  #Backend Services
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: aura_auth_service
    env_file: ./auth-service/.env
    ports:
      - "5001:5001"
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: aura_doctor_service
    env_file: ./doctor-service/.env
    ports:
      - "5002:5002"
    depends_on:
      doctor-db:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: aura_api_gateway
    env_file: ./api-gateway/.env
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - doctor-service
    restart: unless-stopped

  # Frontend
  # Image build bakes VITE_API_BASE_URL (Dockerfile defaults to /api for nginx same-origin proxy).
  # Use frontend/.env when running Vite locally (npm run dev), not inside this container.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aura_frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped


services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    restart: always
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    depends_on:
      - db

  frontend:
    build:
      context: ../telemedicine-frontend
      dockerfile: DockerFile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_AGORA_APP_ID: ${AGORA_APP_ID}
    restart: always
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  pgdata: